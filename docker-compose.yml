services:
  api:
    build: .
    command: uvicorn suite_actuarial.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src

  dashboard:
    build: .
    command: streamlit run streamlit_app/Home.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
